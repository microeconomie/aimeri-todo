<!DOCTYPE html>
<html lang="fr" data-theme="dark"><head><meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aimeri · Todo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.104.0/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.07);
    --text: #f0eff7;
    --text-muted: rgba(240,239,247,0.45);
    --accent: #c9b8ff;
    --accent2: #ffb8d9;
    --tab-active: #c9b8ff;
    --shadow: 0 4px 18px rgba(0,0,0,0.38);
    --radius: 13px;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="light"] {
    --bg: #f0eef8;
    --surface: #ffffff;
    --surface2: #ede9f8;
    --border: rgba(0,0,0,0.08);
    --text: #1a1825;
    --text-muted: rgba(26,24,37,0.45);
    --accent: #7c5cfc;
    --accent2: #f0569a;
    --tab-active: #7c5cfc;
    --shadow: 0 4px 18px rgba(100,80,200,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
    transition: background var(--transition), color var(--transition);
  }

  /* ── AUTH SCREEN ─────────────────────────────────────────── */
  #authScreen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .auth-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    width: 380px; max-width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.45);
  }
  .auth-logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 28px; justify-content: center;
  }
  .auth-logo svg { width: 32px; height: 32px; }
  .auth-logo-text {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .auth-tabs {
    display: flex; gap: 4px; margin-bottom: 24px;
    background: var(--surface2); border-radius: 10px; padding: 4px;
  }
  .auth-tab {
    flex: 1; padding: 8px; border: none; background: transparent;
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.85rem;
    color: var(--text-muted); cursor: pointer; border-radius: 7px;
    transition: background var(--transition), color var(--transition);
  }
  .auth-tab.active { background: var(--surface); color: var(--accent); }

  .auth-form { display: flex; flex-direction: column; gap: 12px; }
  .auth-label {
    font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 4px; display: block;
  }
  .auth-input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 11px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .auth-input:focus { border-color: var(--accent); }

  .auth-btn {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px; color: #fff;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
    cursor: pointer; margin-top: 4px;
    box-shadow: 0 4px 16px rgba(201,184,255,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(201,184,255,0.35); }
  .auth-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  .auth-error {
    padding: 10px 14px; border-radius: 8px;
    background: rgba(214,48,69,0.12); border: 1px solid rgba(214,48,69,0.25);
    color: #ff6b7a; font-size: 0.85rem; display: none;
  }
  .auth-error.show { display: block; }

  .auth-success {
    padding: 10px 14px; border-radius: 8px;
    background: rgba(6,214,160,0.10); border: 1px solid rgba(6,214,160,0.2);
    color: #06d6a0; font-size: 0.85rem; text-align: center; display: none;
  }
  .auth-success.show { display: block; }

  .auth-divider {
    text-align: center; color: var(--text-muted); font-size: 0.8rem;
    margin: 4px 0; position: relative;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; position: absolute; top: 50%; width: 38%; height: 1px;
    background: var(--border);
  }
  .auth-divider::before { left: 0; }
  .auth-divider::after  { right: 0; }

  .auth-magic-btn {
    width: 100%; padding: 11px;
    background: transparent;
    border: 1.5px solid var(--border); border-radius: 10px; color: var(--text-muted);
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .auth-magic-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── APP (hidden until logged in) ───────────────────────── */
  #appScreen { display: none; }
  #appScreen.visible { display: block; }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px 0;
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); transition: background var(--transition);
  }
  .logo-wrap { display: flex; align-items: center; gap: 9px; }
  .logo-icon  { width: 28px; height: 28px; flex-shrink: 0; }
  .logo-text  {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
    letter-spacing: -0.03em; line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    white-space: nowrap;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .user-pill {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px 5px 8px;
    background: var(--surface2); border-radius: 99px;
    border: 1.5px solid var(--border);
    font-size: 0.78rem; color: var(--text-muted);
    max-width: 200px; overflow: hidden;
  }
  .user-pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #06d6a0; flex-shrink: 0;
  }
  .user-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .btn-logout {
    padding: 6px 13px; border: 1.5px solid var(--border);
    border-radius: 99px; background: transparent;
    color: var(--text-muted); font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.78rem; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-logout:hover { border-color: #ff6b7a; color: #ff6b7a; }

  /* THEME SWITCH */
  .theme-switch { position: relative; width: 50px; height: 26px; cursor: pointer; }
  .theme-switch input { display: none; }
  .theme-track {
    position: absolute; inset: 0; background: var(--surface2);
    border-radius: 99px; border: 1.5px solid var(--border);
    transition: background var(--transition);
    display: flex; align-items: center; padding: 3px;
  }
  .theme-thumb {
    width: 18px; height: 18px; background: var(--accent); border-radius: 50%;
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .theme-switch input:checked ~ .theme-track .theme-thumb { transform: translateX(22px); }

  /* ADD BUTTON */
  .btn-add {
    display: flex; align-items: center; gap: 7px; padding: 8px 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 99px; color: #fff;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; box-shadow: 0 4px 14px rgba(201,184,255,0.22);
    transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap; letter-spacing: 0.01em;
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,184,255,0.32); }
  .btn-add:active { transform: scale(0.97); }

  /* TABS */
  .tabs-wrap { padding: 16px 32px 0; display: flex; align-items: flex-end; gap: 2px; }
  .tab {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem;
    padding: 9px 20px; border: none; background: transparent;
    color: var(--text-muted); cursor: pointer; border-radius: 10px 10px 0 0;
    transition: color var(--transition), background var(--transition); letter-spacing: 0.02em;
  }
  .tab.active { color: var(--tab-active); background: var(--surface); }
  .tab .badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 19px; height: 19px; background: var(--accent); color: #fff;
    font-size: 0.70rem; font-weight: 700; border-radius: 99px;
    padding: 0 4px; margin-left: 6px; transition: background var(--transition);
  }
  .tab:not(.active) .badge { background: var(--text-muted); }

  /* BOARD */
  .board {
    margin: 0 32px; background: var(--surface);
    border-radius: 0 16px 16px 16px; border: 1.5px solid var(--border);
    padding: 24px; min-height: 400px;
    transition: background var(--transition), border-color var(--transition);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 56px 20px; color: var(--text-muted); gap: 12px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 0.92rem; font-style: italic; }

  /* LOADING STATE */
  .loading-state {
    grid-column: 1/-1; display: flex; align-items: center; justify-content: center;
    padding: 56px 20px; gap: 12px; color: var(--text-muted);
  }
  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CARD */
  .card {
    position: relative; border-radius: var(--radius);
    padding: 13px 13px 11px; min-height: 134px;
    display: flex; flex-direction: column; gap: 5px;
    box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.09);
    transition: transform 0.18s, box-shadow 0.18s, opacity 0.25s;
    cursor: pointer; overflow: hidden; user-select: none;
  }
  .card:hover { transform: translateY(-3px) scale(1.015); box-shadow: 0 10px 30px rgba(0,0,0,0.17); }
  .card.done-card { opacity: 0.68; }
  .card.done-card:hover { opacity: 0.9; }

  .card-title-preview {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
    color: var(--card-text, #1a1a2e); line-height: 1.3;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-word;
  }
  .card-title-preview.empty { font-style: italic; opacity: 0.38; }

  .card-body-preview {
    font-size: 0.73rem; color: var(--card-text, #1a1a2e); opacity: 0.76;
    line-height: 1.42; flex: 1; overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical; word-break: break-word;
  }
  .card-body-preview.empty { font-style: italic; opacity: 0.36; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: auto; padding-top: 6px;
  }
  .card-age {
    font-size: 0.65rem; color: var(--card-text, #1a1a2e);
    opacity: 0.5; font-weight: 500; letter-spacing: 0.01em;
  }
  .card-actions { display: flex; gap: 4px; }
  .card-btn {
    width: 24px; height: 24px; border-radius: 7px; border: none;
    background: rgba(0,0,0,0.08); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    transition: background 0.15s, transform 0.12s;
    color: var(--card-text, #1a1a2e); opacity: 0.72;
  }
  .card-btn:hover { background: rgba(0,0,0,0.15); transform: scale(1.13); opacity: 1; }
  .card-btn.done-btn:hover    { background: rgba(30,160,80,0.18); }
  .card-btn.del-btn:hover     { background: rgba(210,50,50,0.16); }
  .card-btn.restore-btn:hover { background: rgba(80,140,255,0.18); }
  .card-done-ribbon {
    position: absolute; top: 7px; right: 7px;
    font-size: 0.9rem; line-height: 1; pointer-events: none;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(7px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 30px; width: 440px; max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: translateY(14px) scale(0.96);
    transition: transform 0.28s cubic-bezier(0.34,1.46,0.64,1);
  }
  .modal-overlay.open .modal { transform: none; }
  .modal.edit-mode { border-top: 4px solid var(--edit-color, var(--accent)); }
  .modal h2 {
    font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; margin-bottom: 20px;
  }
  .modal h2.grad {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .modal label {
    display: block; font-size: 0.76rem; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; margin-top: 14px;
  }
  .modal input, .modal textarea {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 13px;
    font-family: 'DM Sans', sans-serif; font-size: 0.93rem; color: var(--text);
    outline: none; transition: border-color 0.15s; resize: none;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { min-height: 88px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  .btn-cancel {
    padding: 9px 18px; border: 1.5px solid var(--border); border-radius: 99px;
    background: transparent; color: var(--text-muted);
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.84rem; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .btn-create {
    padding: 9px 22px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 99px; color: #fff;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.84rem; cursor: pointer;
    box-shadow: 0 4px 14px rgba(201,184,255,0.22); transition: transform 0.12s;
  }
  .btn-create:hover { transform: translateY(-1px); }
  .btn-create:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #d63045; color: #fff; padding: 13px 22px; border-radius: 13px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.87rem;
    box-shadow: 0 8px 28px rgba(214,48,69,0.35);
    z-index: 500; opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    text-align: center; max-width: 460px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; pointer-events: none; z-index: 9999; border-radius: 2px;
    animation: cffall 1.1s ease-in forwards;
  }
  @keyframes cffall {
    0%   { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: var(--cf-to) rotate(720deg) scale(0.2); opacity: 0; }
  }

  /* CARD ANIMATIONS */
  @keyframes card-in {
    from { opacity: 0; transform: scale(0.84) translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  .card { animation: card-in 0.28s cubic-bezier(0.4,0,0.2,1) both; }

  @keyframes complete-burst {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.07); }
    65%  { transform: scale(0.94); }
    100% { transform: scale(1); opacity: 0; }
  }
  .card.completing { animation: complete-burst 0.48s ease forwards; pointer-events: none; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .footer-info {
    text-align: center; padding: 14px;
    color: var(--text-muted); font-size: 0.72rem; letter-spacing: 0.04em;
  }

  /* SYNC INDICATOR */
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #06d6a0; display: inline-block; margin-left: 6px;
    transition: background 0.3s;
  }
  .sync-dot.syncing { background: var(--accent); animation: pulse 0.8s ease infinite; }
  .sync-dot.error   { background: #ff6b7a; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     AUTH SCREEN
════════════════════════════════════════════════════════════ -->
<div id="authScreen" style="display: none;">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <lineargradient id="alg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c9b8ff"></stop>
            <stop offset="100%" stop-color="#ffb8d9"></stop>
          </lineargradient>
        </defs>
        <rect x="5" y="2" width="16" height="22" rx="2.5" fill="url(#alg)" opacity="0.15"></rect>
        <rect x="5" y="2" width="16" height="22" rx="2.5" stroke="url(#alg)" stroke-width="1.6"></rect>
        <line x1="9" y1="2" x2="9" y2="24" stroke="url(#alg)" stroke-width="1.4"></line>
        <circle cx="9" cy="7.5" r="1.3" fill="url(#alg)"></circle>
        <circle cx="9" cy="14" r="1.3" fill="url(#alg)"></circle>
        <circle cx="9" cy="20.5" r="1.3" fill="url(#alg)"></circle>
        <line x1="12" y1="9" x2="19" y2="9" stroke="url(#alg)" stroke-width="1.2" stroke-linecap="round"></line>
        <line x1="12" y1="12.5" x2="19" y2="12.5" stroke="url(#alg)" stroke-width="1.2" stroke-linecap="round"></line>
        <line x1="12" y1="16" x2="16" y2="16" stroke="url(#alg)" stroke-width="1.2" stroke-linecap="round"></line>
        <path d="M20 19.5l4-4 1.8 1.8-4 4z" fill="url(#alg)"></path>
        <path d="M20 19.5l-.8 2.6 2.6-.8z" fill="url(#alg)" opacity="0.7"></path>
      </svg>
      <span class="auth-logo-text">Aimeri · Todo</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="switchAuthTab(&#39;login&#39;)">Connexion</button>
      <button class="auth-tab" id="signupTab" onclick="switchAuthTab(&#39;signup&#39;)">Inscription</button>
    </div>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <!-- LOGIN -->
    <div id="loginForm" class="auth-form">
      <div>
        <label class="auth-label">Email</label>
        <input class="auth-input" type="email" id="loginEmail" placeholder="ton@email.fr" autocomplete="email">
      </div>
      <div>
        <label class="auth-label">Mot de passe</label>
        <input class="auth-input" type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
      <div class="auth-divider">ou</div>
      <button class="auth-magic-btn" onclick="doMagicLink()">✉️ &nbsp;Connexion par lien magique</button>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="auth-form" style="display:none">
      <div>
        <label class="auth-label">Email</label>
        <input class="auth-input" type="email" id="signupEmail" placeholder="ton@email.fr" autocomplete="email">
      </div>
      <div>
        <label class="auth-label">Mot de passe</label>
        <input class="auth-input" type="password" id="signupPwd" placeholder="8 caractères minimum" autocomplete="new-password">
      </div>
      <button class="auth-btn" id="signupBtn" onclick="doSignup()">Créer mon compte</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     APP SCREEN

// ═══════════════════════════════════════════════════════════

let tasks      = [];
let modalMode  = 'new';
let editingId  = null;

const COLOR_PAIRS = [
  { bg: '#FADADD', text: '#4A2C2A' },
  { bg: '#D6EAF8', text: '#1B2631' },

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
function switchAuthTab(tab) {
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  document.getElementById('loginForm').style.display  = tab === 'login'  ? 'flex' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'flex' : 'none';
  clearAuthMessages();
}

function clearAuthMessages() {
  document.getElementById('authError').classList.remove('show');
  document.getElementById('authSuccess').classList.remove('show');
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('authSuccess').classList.remove('show');
}

function showAuthSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('authError').classList.remove('show');
}

function setAuthLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? '…' : (btnId === 'loginBtn' ? 'Se connecter' : 'Créer mon compte');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  if (!email || !pwd) { showAuthError('Remplis les deux champs.'); return; }
  setAuthLoading('loginBtn', true);
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
  setAuthLoading('loginBtn', false);
  if (error) showAuthError(friendlyError(error.message));
}

async function doSignup() {
  const email = document.getElementById('signupEmail').value.trim();
  const pwd   = document.getElementById('signupPwd').value;
  if (!email || !pwd) { showAuthError('Remplis les deux champs.'); return; }
  if (pwd.length < 8) { showAuthError('Le mot de passe doit faire au moins 8 caractères.'); return; }
  setAuthLoading('signupBtn', true);
  const { error } = await sb.auth.signUp({ email, password: pwd });
  setAuthLoading('signupBtn', false);
  if (error) showAuthError(friendlyError(error.message));
}

async function doMagicLink() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showAuthError('Entre ton email d\'abord.'); return; }
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: 'https://kinkyside.github.io/aimeri-todo/' } });
  if (error) showAuthError(friendlyError(error.message));
  else showAuthSuccess('✉️ Lien magique envoyé ! Vérifie ta boîte mail.');
}

async function doLogout() {
  await sb.auth.signOut();
}

function friendlyError(msg) {
  if (msg.includes('Invalid login'))      return 'Email ou mot de passe incorrect.';
  if (msg.includes('Email not confirmed')) return 'Email ou mot de passe incorrect.';
  if (msg.includes('already registered')) return 'Ce compte existe déjà. Connecte-toi !';
  if (msg.includes('Password'))           return 'Mot de passe trop court (8 caractères minimum).';
  return msg;
}

// ─── Auth helpers ─────────────────────────────────────────
function showApp(user) {
  currentUser = user;
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');
}
function showAuth() {
  currentUser = null;
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').classList.remove('visible');
  tasks = [];
  renderAll();
}

// ─── Session init au chargement ───────────────────────────
// getSession() attend que le client soit prêt avant de retourner la session,
// contrairement à INITIAL_SESSION qui peut s'émettre trop tôt pour les requêtes REST.
let _loadingTasks = false;
async function startApp(user) {
  showApp(user);
  if (_loadingTasks) return;
  _loadingTasks = true;
  await loadTasks();
  await migrateLocalStorage();
  _loadingTasks = false;
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) startApp(session.user);
  else showAuth();
});

// ─── Changements d'auth ultérieurs ────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    _loadingTasks = false; // reset pour forcer un rechargement
    startApp(session.user);
  } else if (event === 'SIGNED_OUT') {
    _loadingTasks = false;
    showAuth();
  }
  // INITIAL_SESSION, TOKEN_REFRESHED → ignorés (getSession() gère le démarrage)
});

// ═══════════════════════════════════════════════════════════
// SUPABASE DATA
// ═══════════════════════════════════════════════════════════
function setSyncDot(state) {
  const d = document.getElementById('syncDot');
  if (!d) return;
  d.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  d.title = state === 'syncing' ? 'Synchronisation…' : state === 'error' ? 'Erreur de sync' : 'Synchronisé';
}

async function loadTasks() {
  setSyncDot('syncing');
  const grid = document.getElementById('grid-pending');
  grid.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Chargement…</span></div>';

  const { data, error } = await sb
    .from('tasks')
    .select('*')
    .order('created_at', { ascending: true });

  if (error) { setSyncDot('error'); showToast('Erreur de chargement : ' + error.message); renderAll(); return; }

  tasks = (data || []).map(dbToLocal);
  setSyncDot('ok');
  renderAll();
}

async function insertTask(task) {
  setSyncDot('syncing');
  const { data, error } = await sb.from('tasks').insert([localToDb(task)]).select().single();
  if (error) { setSyncDot('error'); showToast('Erreur : ' + error.message); return null; }
  setSyncDot('ok');
  return dbToLocal(data);
}

async function updateTaskDb(task) {
  setSyncDot('syncing');
  const { error } = await sb.from('tasks').update(localToDb(task)).eq('id', task.id);
  if (error) { setSyncDot('error'); showToast('Erreur : ' + error.message); }
  else setSyncDot('ok');
}

async function deleteTaskDb(id) {
  setSyncDot('syncing');
  const { error } = await sb.from('tasks').delete().eq('id', id);
  if (error) { setSyncDot('error'); showToast('Erreur : ' + error.message); }
  else setSyncDot('ok');
}

function localToDb(t) {
  return {
    id:         t.id.startsWith('task_') ? crypto.randomUUID() : t.id,
    user_id:    currentUser.id,
    title:      t.title,
    body:       t.body,
    done:       t.done,
    created_at: new Date(t.createdAt).toISOString(),
    done_at:    t.doneAt ? new Date(t.doneAt).toISOString() : null,
    color:      t.color,
  };
}

function dbToLocal(r) {
  return {
    id:        r.id,
    title:     r.title || '',
    body:      r.body  || '',
    done:      r.done  || false,
    createdAt: new Date(r.created_at).getTime(),
    doneAt:    r.done_at ? new Date(r.done_at).getTime() : null,
    color:     r.color || randomColor(),
  };
}

// Migrate existing localStorage tasks to Supabase (one-time)
async function migrateLocalStorage() {
  const OLD_KEY = 'aimeri_tasks_v3';
  const raw = localStorage.getItem(OLD_KEY);
  if (!raw) return;
  try {
    const old = JSON.parse(raw);
    if (!Array.isArray(old) || old.length === 0) { localStorage.removeItem(OLD_KEY); return; }
    // Only migrate if Supabase is empty
    if (tasks.length > 0) { localStorage.removeItem(OLD_KEY); return; }
    for (const t of old) {
      if (typeof t.color === 'string') t.color = randomColor();
      const inserted = await insertTask(t);
      if (inserted) tasks.push(inserted);
    }
    localStorage.removeItem(OLD_KEY);
    renderAll();
    showToast('✅ Tes anciennes tâches ont été importées !');
  } catch(e) { localStorage.removeItem(OLD_KEY); }
}

// ═══════════════════════════════════════════════════════════
// TIME AGO
// ═══════════════════════════════════════════════════════════
function timeAgo(ts) {
  const d = (Date.now() - ts) / 1000;
  if (d < 60)      return "À l'instant";
  if (d < 3600)    return `Il y a ${Math.floor(d/60)} min`;
  if (d < 86400)   return `Il y a ${Math.floor(d/3600)} h`;
  if (d < 604800)  return `Il y a ${Math.floor(d/86400)} j`;
  if (d < 2592000) return `Il y a ${Math.floor(d/604800)} sem`;
  return `Il y a ${Math.floor(d/2592000)} mois`;
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderAll() {
  const pending = tasks.filter(t => !t.done).sort((a,b) => a.createdAt - b.createdAt);
  const done    = tasks.filter(t =>  t.done).sort((a,b) => b.doneAt    - a.doneAt);
  renderGrid('grid-pending', pending, false);
  renderGrid('grid-done',    done,    true);
  document.getElementById('badge-pending').textContent = pending.length;
  document.getElementById('badge-done').textContent    = done.length;
  const n = pending.length;
  document.getElementById('footer-info').textContent =
    n > 0 ? `${n} tâche${n>1?'s':''} en attente · max 30` : '';
}

function renderGrid(gridId, list, isDone) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <rect x="8" y="12" width="32" height="28" rx="4" stroke="currentColor" stroke-width="2"/>
        <path d="M16 20h16M16 26h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p>${isDone ? "Aucune tâche terminée pour l'instant." : "Tout est libre ! Crée ta première tâche."}</p>
    </div>`;
    return;
  }
  list.forEach(t => grid.appendChild(buildCard(t, isDone)));
}

function buildCard(task, isDone) {
  const card = document.createElement('div');
  card.className = 'card' + (isDone ? ' done-card' : '');
  card.dataset.id = task.id;
  const pair = (task.color && typeof task.color === 'object') ? task.color : randomColor();
  card.style.background = pair.bg;
  card.style.setProperty('--card-text', pair.text);

  card.innerHTML = `
    ${isDone ? '<div class="card-done-ribbon">✅</div>' : ''}
    <div class="card-title-preview${task.title?'':' empty'}">${task.title ? esc(task.title) : 'Sans titre…'}</div>
    <div class="card-body-preview${task.body?'':' empty'}">${task.body ? esc(task.body) : 'Cliquer pour modifier…'}</div>
    <div class="card-footer">
      <span class="card-age">${isDone ? '✓ '+timeAgo(task.doneAt) : timeAgo(task.createdAt)}</span>
      <div class="card-actions">
        ${!isDone
          ? `<button class="card-btn done-btn" title="Marquer terminée" onclick="completeTask('${task.id}',event)">✓</button>`
          : `<button class="card-btn restore-btn" title="Remettre en attente" onclick="restoreTask('${task.id}',event)">↩</button>`
        }
        <button class="card-btn del-btn" title="Supprimer" onclick="deleteTask('${task.id}',event)">✕</button>
      </div>
    </div>`;

  card.addEventListener('click', e => {
    if (e.target.closest('.card-btn')) return;
    openEditModal(task.id);
  });
  return card;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
function openNewModal() {
  modalMode = 'new'; editingId = null;
  const h2 = document.getElementById('modalTitle');
  h2.textContent = 'Nouvelle tâche ✦'; h2.className = 'grad'; h2.style.color = '';
  document.getElementById('mTitle').value = '';
  document.getElementById('mBody').value  = '';
  document.getElementById('modalSaveBtn').textContent = 'Créer ✦';
  document.getElementById('modalSaveBtn').disabled = false;
  const modal = document.getElementById('modal');
  modal.classList.remove('edit-mode');
  modal.style.removeProperty('border-top-color');
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('mTitle').focus(), 220);
}

function openEditModal(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  modalMode = 'edit'; editingId = id;
  const h2 = document.getElementById('modalTitle');
  h2.textContent = '✏️  Modifier la tâche'; h2.className = ''; h2.style.color = 'var(--text)';
  document.getElementById('mTitle').value = task.title || '';
  document.getElementById('mBody').value  = task.body  || '';
  document.getElementById('modalSaveBtn').textContent = 'Enregistrer';
  document.getElementById('modalSaveBtn').disabled = false;
  const pair = (task.color && typeof task.color === 'object') ? task.color : randomColor();
  const modal = document.getElementById('modal');
  modal.classList.add('edit-mode');
  modal.style.borderTopColor = pair.text;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('mTitle').focus(), 220);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
function saveModal() { modalMode === 'new' ? createTask() : updateTask(); }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter' &&
      document.getElementById('modalOverlay').classList.contains('open')) saveModal();
});

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
async function createTask() {
  const title = document.getElementById('mTitle').value.trim();
  const body  = document.getElementById('mBody').value.trim();
  if (!title) { document.getElementById('mTitle').focus(); return; }
  if (tasks.filter(t => !t.done).length >= 30) {
    closeModal();
    showToast("Aimeri, tu as déjà 30 tâches en attente, occupe-toi-en d'abord avant d'en créer une 31ème !");
    return;
  }
  document.getElementById('modalSaveBtn').disabled = true;
  const local = {
    id: 'task_' + Date.now(),
    title, body, done: false,
    createdAt: Date.now(), doneAt: null,
    color: randomColor()
  };
  const saved = await insertTask(local);
  if (saved) {
    tasks.push(saved);
    closeModal(); switchTab('pending'); renderAll();
  } else {
    document.getElementById('modalSaveBtn').disabled = false;
  }
}

async function updateTask() {
  const task = tasks.find(t => t.id === editingId);
  if (!task) return;
  document.getElementById('modalSaveBtn').disabled = true;
  task.title = document.getElementById('mTitle').value.trim();
  task.body  = document.getElementById('mBody').value.trim();
  await updateTaskDb(task);
  closeModal(); renderAll();
}

async function completeTask(id, evt) {
  evt.stopPropagation();
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.classList.add('completing'); spawnConfetti(evt); }
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = true; t.doneAt = Date.now();
  await updateTaskDb(t);
  setTimeout(() => renderAll(), 480);
}

async function restoreTask(id, evt) {
  evt.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (tasks.filter(t => !t.done).length >= 30) {
    showToast("Aimeri, tu as déjà 30 tâches en attente, occupe-toi-en d'abord avant d'en créer une 31ème !");
    return;
  }
  t.done = false; t.doneAt = null;
  await updateTaskDb(t);
  renderAll();
}

async function deleteTask(id, evt) {
  evt.stopPropagation();
  await deleteTaskDb(id);
  tasks = tasks.filter(t => t.id !== id);
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════
const FIESTA = ['#ff6b9d','#ffd166','#06d6a0','#118ab2','#c77dff','#ff9f1c','#2ec4b6','#e63946','#ffbe0b'];
function spawnConfetti(evt) {
  const x = evt ? evt.clientX : window.innerWidth/2;
  const y = evt ? evt.clientY : window.innerHeight/2;
  for (let i = 0; i < 34; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = Math.random() * 360;
    const dist  = 50 + Math.random() * 130;
    const sz    = 6 + Math.random() * 7;
    el.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;
      background:${FIESTA[Math.floor(Math.random()*FIESTA.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${.75+Math.random()*.55}s;
      --cf-to:translate(${Math.cos(angle*Math.PI/180)*dist}px,${Math.sin(angle*Math.PI/180)*dist}px);`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
}

// ═══════════════════════════════════════════════════════════
// TOAST / TABS / THEME
// ═══════════════════════════════════════════════════════════
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5200);
}

function switchTab(tab) {
  ['pending','done'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
}

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeThumb').textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('aimeri_theme', dark ? 'dark' : 'light');
}
document.getElementById('themeToggle').addEventListener('change', function() {
  applyTheme(!this.checked);
});

setInterval(() => {
  document.querySelectorAll('.card-age').forEach(el => {
    const card = el.closest('.card');
    if (!card) return;
    const t = tasks.find(t => t.id === card.dataset.id);
    if (t) el.textContent = t.done ? '✓ '+timeAgo(t.doneAt) : timeAgo(t.createdAt);
  });
}, 30000);

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(function() {
  const dark = (localStorage.getItem('aimeri_theme') || 'dark') === 'dark';
  applyTheme(dark);
  document.getElementById('themeToggle').checked = !dark;

  // Enter key on auth inputs
  ['loginEmail','loginPwd'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  });
  ['signupEmail','signupPwd'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doSignup(); });
  });
})();
</script>
